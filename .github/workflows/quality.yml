name: warehouse-quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt 2>&1 | tee install.log
      - name: Generate deterministic sources
        run: python data/generate_synthetic_data.py 2>&1 | tee generate.log
      - name: Build DuckDB warehouse
        run: |
          set -o pipefail
          python duckdb_local_simulator/build_warehouse.py 2>&1 | tee build.log
      - name: Validate exported outputs
        run: |
          set -o pipefail
          python validation/validate_duckdb_outputs.py 2>&1 | tee validation.log
      - name: Run tests
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest.log
      - name: Upload evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-warehouse-evidence
          path: |
            outputs/
            *.log
          if-no-files-found: warn
