name: warehouse-quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --requirement requirements.txt
      - run: python data/generate_synthetic_data.py
      - run: python duckdb_local_simulator/build_warehouse.py
      - run: python validation/validate_duckdb_outputs.py
      - run: pytest -q
      - uses: actions/upload-artifact@v4
        with:
          name: cloud-warehouse-evidence
          path: outputs/
          if-no-files-found: error
